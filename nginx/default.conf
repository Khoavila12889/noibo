server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;
    
    # Gzip compression for static files (CRITICAL FOR SPEED)
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/javascript application/json application/ld+json application/manifest+json application/x-web-app-manifest+json image/svg+xml text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

    # Upload settings
    client_max_body_size 16G;
    client_body_timeout 3600s;
    client_body_buffer_size 1M;
    
    # FastCGI settings (global)
    fastcgi_buffers 64 8K;
    fastcgi_buffer_size 32k;
    fastcgi_read_timeout 3600s;
    fastcgi_send_timeout 3600s;
    fastcgi_connect_timeout 60s;
    fastcgi_request_buffering off;
    
    # Nextcloud specific settings
    rewrite ^/.well-known/carddav /remote.php/dav/ redirect;
    rewrite ^/.well-known/caldav /remote.php/dav/ redirect;
    rewrite ^/.well-known/webfinger /index.php/.well-known/webfinger redirect;
    rewrite ^/.well-known/nodeinfo /index.php/.well-known/nodeinfo redirect;
    
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
    
    # Deny access to sensitive files
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/)  {
        deny all;
    }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }
    
    location / {
        rewrite ^ /index.php;
    }
    
    location ~ ^\/(?:index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|oc[ms]-provider\/.+)\.php(?:$|\/) {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(\/.*|)$;
        set $path_info $fastcgi_path_info;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        
        # Vì dùng NPM làm reverse proxy
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_SCHEME https;
        fastcgi_param SERVER_PORT 443;
        
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        
        fastcgi_pass app:9000;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
    }
    
    location ~ ^\/(?:updater|oc[ms]-provider)(?:$|\/) {
        try_files $uri/ =404;
        index index.php;
    }
    
    # Static files với cache dài hạn
    location ~ \.(?:css|js|mjs|svg|gif|png|jpg|jpeg|ico|woff2?|webp)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        access_log off;
        
        add_header Cache-Control "public, max-age=15778463" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}