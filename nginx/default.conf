server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;
    
    # Upload settings
    client_max_body_size 16G;
    client_body_timeout 300s;
    client_body_buffer_size 512k;        # ← Tăng lên cho file lớn
    
    # FastCGI settings (global)
    fastcgi_buffers 64 4K;
    fastcgi_read_timeout 300s;
    fastcgi_send_timeout 300s;
    fastcgi_connect_timeout 60s;         # ← 60s là đủ cho connection
    fastcgi_request_buffering off;
    
    # Nextcloud specific settings
    rewrite ^/.well-known/carddav /remote.php/dav/ redirect;
    rewrite ^/.well-known/caldav /remote.php/dav/ redirect;
    rewrite ^/.well-known/webfinger /index.php/.well-known/webfinger redirect;
    rewrite ^/.well-known/nodeinfo /index.php/.well-known/nodeinfo redirect;
    
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
    
    # Deny access to sensitive files
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/)  {
        deny all;
    }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }
    
    location / {
        rewrite ^ /index.php;
    }
    
    location ~ ^\/(?:index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|oc[ms]-provider\/.+)\.php(?:$|\/) {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(\/.*|)$;
        set $path_info $fastcgi_path_info;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        
        # QUAN TRỌNG: Vì dùng NPM làm reverse proxy
        fastcgi_param HTTPS on;                          # ← Đổi thành 'on'
        fastcgi_param HTTP_SCHEME https;                 # ← Thêm
        fastcgi_param SERVER_PORT 443;                   # ← Thêm
        
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        
        fastcgi_pass app:9000;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        
        # Timeouts (đã có global nhưng có thể override)
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }
    
    location ~ ^\/(?:updater|oc[ms]-provider)(?:$|\/) {
        try_files $uri/ =404;
        index index.php;
    }
    
    # Static files với cache
    location ~ \.(?:css|js|mjs|svg|gif|png|jpg|jpeg|ico|woff2?|webp)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        access_log off;
        
        # Headers cho static files
        add_header Cache-Control "public, max-age=15778463" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
    
    # Nextcloud security headers
    # LƯU Ý: Các headers này có thể conflict với NPM
    # Nên set headers ở NPM thay vì ở đây
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "1; mode=block" always;
}