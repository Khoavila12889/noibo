services:
  db:
    image: mariadb:lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${DB_VOLUME_PATH}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${REDIS_VOLUME_PATH}:/data
    networks:
      - nextcloud_network

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: db
      NEXTCLOUD_TRUSTED_PROXIES: ${NEXTCLOUD_TRUSTED_PROXIES}
      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITE_PROTOCOL}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
      PHP_UPLOAD_LIMIT: ${PHP_UPLOAD_LIMIT}
    volumes:
      - ${HTML_VOLUME_PATH}:/var/www/html
      - ${MOUNT_LNV_PATH}:/mnt/nhansu
      - ./php/php.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro  # ← Đổi thành zzz-custom.ini
      - ./php/www.conf:/usr/local/etc/php-fpm.d/zzz-www.conf:ro
    expose:
      - "9000"
    networks:
      - nextcloud_network

  web:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
    volumes:
      - ${HTML_VOLUME_PATH}:/var/www/html:ro
      - ${NGINX_CONFIG_PATH}:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT}:80"
    networks:
      - nextcloud_network

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 2G
    ports:
      - "${PHPMYADMIN_PORT}:80"
    networks:
      - nextcloud_network

networks:
  nextcloud_network:
    driver: bridge